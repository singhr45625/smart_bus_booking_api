<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBus | Easy Booking</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="gradient-bg"></div>
    
    <header>
        <div class="logo">SmartBus</div>
        <nav id="navbar">
            <a href="index.html">Home</a>
            <span id="auth-links">
                <a href="login.html">Login</a>
                <a href="signup.html" class="btn-auth">Sign Up</a>
            </span>
        </nav>
    </header>

    <main>
        <section class="hero" id="hero-section">
            <h1>Travel Smarter, Book Faster</h1>
            <p>Premium bus services at your fingertips.</p>
        </section>

        <section class="search-box">
            <div class="input-group">
                <label>From</label>
                <input type="text" id="from" placeholder="Enter source city">
            </div>
            <div class="input-group">
                <label>To</label>
                <input type="text" id="to" placeholder="Enter destination">
            </div>
            <button class="btn-primary" onclick="searchBuses()">Search Buses</button>
        </section>

        <section class="bus-results" id="bus-list">
            <!-- Buses will be rendered here -->
        </section>

        <section id="bookings-section" style="display:none;" class="profile-section">
            <h2>Your Bookings</h2>
            <div id="booking-list"></div>
        </section>
    </main>

    <script src="js/app.js"></script>
    <script>
        // Check session on load
        window.onload = async () => {
            const user = localStorage.getItem('username');
            if (user) {
                updateUIForLoggedInUser(user);
                loadMyBookings();
            }
            searchBuses(); // Initial load
        };
    </script>
</body>
</html>
